<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tamales Lalito - Pedidos en Línea</title>
</head>
<body>
  <h1>Haz tu pedido</h1>

  <!-- Formulario de pedido -->
  <form id="pedidoForm">
    <label for="nombre">Nombre:</label>
    <input type="text" id="nombre" name="nombre" required><br><br>

    <label for="tamales">Cantidad de tamales:</label>
    <input type="number" id="tamales" name="tamales" required><br><br>

    <label for="sabor">Sabor:</label>
    <input type="text" id="sabor" name="sabor" required><br><br>

    <button type="button" onclick="enviarWhatsApp()">Confirmar Pedido por WhatsApp</button>
  </form>

  <script>
    function enviarWhatsApp() {
      // Tomar los datos del formulario
      let nombre = document.getElementById("nombre").value;
      let tamales = document.getElementById("tamales").value;
      let sabor = document.getElementById("sabor").value;

      // Construir el mensaje dinámico
      let mensaje = `Hola Lalito, soy ${nombre}. Quiero pedir ${tamales} tamales de ${sabor}. Compa exitoss`;

      // URL correcta con tu número en formato internacional
      let url = `https://wa.me/525643804660?text=${encodeURIComponent(mensaje)}`;

      // Abrir WhatsApp Web o la app en el celular
      window.open(url, '_blank');
    }
  </script>
</body>
</html>
